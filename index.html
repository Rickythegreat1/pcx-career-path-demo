<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCx Career Path · Working Demo</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%23155DFC'/><text x='16' y='23' font-family='Arial,sans-serif' font-size='20' font-weight='700' fill='%23fff' text-anchor='middle'>P</text></svg>">
<meta name="description" content="Interactive demo of the PCx Career Path system: the ranked Agent Home, the Career Path Builder, and leader verification, running as one connected loop.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* PCx V2 design language: zinc neutrals, one action blue, navy shell.
   Single file, no dependencies, mock data only. */
:root {
  --z50:#FAFAFA; --z100:#F4F4F5; --z200:#E4E4E7; --z300:#D4D4D8; --z400:#A1A1AA;
  --z500:#71717A; --z600:#52525B; --z700:#3F3F46; --z800:#27272A; --z900:#18181B;
  --blue:#155DFC; --blue-700:#1447E6; --blue-50:#EFF6FF; --blue-200:#BFDBFE;
  --blue-bright:#2B7FFF; --navy2:#1E2939;
  --green:#00A63E; --green-100:#DCFCE7; --green-800:#166534;
  --amber:#E17100; --amber-100:#FFEDD4; --amber-800:#92400E;
  --red:#E7000B; --navy:#101828;
  --sans:"Inter",-apple-system,"Segoe UI","Helvetica Neue",Arial,sans-serif;
  --mono:"SF Mono",Menlo,Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--z100);color:var(--z900);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;font-size:14px}
:focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:3px}
[role="button"]{cursor:pointer}

/* ---------- app frame ---------- */
.app{display:grid;grid-template-columns:256px 1fr;min-height:100vh}
aside.side{background:var(--navy);color:#fff;padding:20px 16px;display:flex;flex-direction:column;gap:2px}
.side .logo{display:flex;align-items:center;gap:10px;padding:4px 10px 18px}
.side .logo .mark{width:40px;height:40px;background:var(--blue);border-radius:8px;display:grid;place-items:center;font-weight:700;font-size:15px}
.side .logo b{font-size:14px}
.side .logo span{display:block;font-size:11px;color:#8B95A7}
.side .grp{font-size:12px;font-weight:600;letter-spacing:.05em;color:#AAB4C6;padding:14px 10px 6px;text-transform:uppercase}
.side a{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;color:#A7B0C0;font-size:14px;font-weight:500;text-decoration:none}
.side a.on{background:var(--navy2);color:#fff}
.side a.dim{opacity:.45;pointer-events:none}
.side a svg{width:17px;height:17px;flex:none;fill:none;stroke:currentColor;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round;opacity:.9}
main{min-width:0}
.topbar{background:#fff;border-bottom:1px solid var(--z200);padding:10px 26px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20}
.topbar .crumb{font-size:13px;color:var(--z500)}
.topbar .spacer{flex:1}
.switch{display:flex;background:var(--z100);border:1px solid var(--z200);border-radius:9px;padding:3px;gap:2px}
.switch button{padding:6px 13px;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--z500)}
.switch button.on{background:#fff;color:var(--z900);box-shadow:0 1px 2px #0002}
.content{padding:32px 32px 70px;max-width:1120px}

/* ---------- shared bits ---------- */
.h-row{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:4px;flex-wrap:wrap}
h1{font-size:20px;font-weight:700;letter-spacing:-.01em}
.sub{color:var(--z600);font-size:12px;margin-bottom:20px}
.card{background:#fff;border:1px solid var(--z200);border-radius:12px}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;letter-spacing:.01em}
.badge.green{background:var(--green-100);color:var(--green-800)}
.badge.amber{background:var(--amber-100);color:var(--amber-800)}
.badge.blue{background:var(--blue-50);color:var(--blue-700)}
.badge.zinc{background:var(--z100);color:var(--z600);border:1px solid var(--z200)}
.btn{background:var(--blue);color:#fff;font-weight:600;font-size:12px;padding:8px 14px;border-radius:8px}
.btn:hover{background:var(--blue-700)}
.btn.ghost{background:#fff;color:var(--z700);border:1px solid var(--z200);font-weight:500}
.btn.ghost:hover{background:var(--z50)}
.btn.dark{background:var(--z900)}
.btn.dark:hover{background:var(--z800)}
.btn:disabled{background:var(--z300);cursor:not-allowed}
.mini{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--z600)}
.toast{position:fixed;bottom:64px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--z900);color:#fff;padding:10px 18px;border-radius:9px;font-size:13.5px;opacity:0;transition:.25s;z-index:60;pointer-events:none;max-width:92vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---------- agent home ---------- */
.home-grid{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
.hero{border:1.5px solid var(--blue);background:var(--blue-50);border-radius:12px;padding:18px 20px;margin-bottom:18px;position:relative}
.hero .mini{color:var(--blue-700)}
.hero h2{font-size:17px;margin:6px 0 3px;letter-spacing:-.005em}
.hero .meta{font-size:13px;color:var(--z600)}
.hero .act{margin-top:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.why{font-size:12px;color:var(--blue-700);text-decoration:underline dotted;cursor:pointer}
.whybox{display:none;margin-top:10px;background:#fff;border:1px solid var(--blue-200);border-radius:8px;padding:10px 14px;font-size:12.5px;color:var(--z600)}
.whybox.open{display:block}
.whybox b{font-family:var(--mono);font-size:10.5px;color:var(--blue-700)}
.feed .item{display:flex;align-items:center;gap:13px;padding:13px 16px;border-bottom:1px solid var(--z100)}
.feed .item:last-child{border-bottom:none}
.feed .chk{width:16px;height:16px;border:1.5px solid var(--z300);border-radius:4px;flex:none;cursor:pointer;display:grid;place-items:center;color:#fff;font-size:11px}
.feed .item.done .chk{background:var(--blue-bright);border-color:var(--blue-bright)}
.feed .item.done .t{text-decoration:line-through;color:var(--z500)}
.feed .grow{min-width:0;flex:1}
.feed .t{font-size:13px;font-weight:500}
.feed .m{font-size:12px;color:var(--z500)}
.feed .item.waiting{background:var(--z50)}
.feed .item.waiting .chk{border-style:dashed;cursor:default;color:var(--z500)}
.tierchip{font-family:var(--mono);font-size:9.5px;color:var(--z500);flex:none}
.rail .card{padding:15px 17px;margin-bottom:14px}
.rail h2{font-size:13.5px;font-weight:600;margin-bottom:8px}
.bar{height:4px;background:var(--z100);border-radius:99px;overflow:hidden;margin:8px 0 6px}
.bar i{display:block;height:100%;background:var(--blue-bright);border-radius:99px;transition:width .5s}
.rail .ln{font-size:12.5px;color:var(--z600);padding:3px 0}
.rail .ln a{display:inline-block;padding:7px 9px;margin:-5px -3px;border-radius:6px}
.rail .ln a:active{background:var(--z100)}
.stage-ln{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:3px 0;color:var(--z600)}
.stage-ln .sdot{width:8px;height:8px;border-radius:99px;background:var(--z300);flex:none}
.stage-ln.done .sdot{background:var(--green)}
.stage-ln.cur .sdot{background:var(--blue)}
.stage-ln.cur{color:var(--z900);font-weight:600}
.gatecard{border:1.5px solid var(--green);background:var(--green-100);border-radius:12px;padding:16px 18px;margin-bottom:18px;display:none}
.gatecard.show{display:block;animation:pop .4s}
@keyframes pop{0%{transform:scale(.97);opacity:0}100%{transform:scale(1);opacity:1}}
.gatecard h2{font-size:16px;color:var(--green-800)}
.gatecard p{font-size:13px;color:var(--green-800);opacity:.85;margin-top:3px}

/* ---------- builder ---------- */
.b-grid{display:grid;grid-template-columns:250px 1fr 250px;gap:16px;align-items:start}
.b-col .card{padding:14px}
.b-col h2{font-size:13px;font-weight:700;margin-bottom:10px}
.stg{padding:9px 10px;border-radius:8px;margin-bottom:4px}
.stg .nm{font-size:13.5px;font-weight:600}
.stg .ct{font-size:11.5px;color:var(--z500)}
.path{padding:8px 10px 8px 22px;border-radius:7px;font-size:13px;color:var(--z600);cursor:pointer;display:flex;justify-content:space-between;gap:8px;align-items:center}
.path.sel{background:var(--blue-50);color:var(--blue-700);font-weight:600}
.path .badge{font-size:9.5px;padding:1px 7px}
.reorder-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.reorder-head h2{margin-bottom:0}
.reorder-hint{font-size:10.5px;color:var(--z500);text-align:right;line-height:1.35}
.reorder-list{position:relative;list-style:none;margin:0;padding:0}
.itemrow{display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid var(--z200);border-radius:8px;margin-bottom:7px;background:var(--z50);position:relative;transition:transform .18s cubic-bezier(.2,.8,.2,1),box-shadow .18s,border-color .18s,opacity .18s,background .18s}
.itemrow:hover:not(.dragging){transform:translateY(-1px);box-shadow:0 5px 14px #1018280d;border-color:var(--z300)}
.itemrow.vrow{background:var(--green-100);border-color:#86EFAC}
.itemrow.dragging{opacity:.2;transform:scale(.985);box-shadow:none}
.itemrow.drop-before::before,.itemrow.drop-after::after{content:"Drop here";position:absolute;left:8px;right:8px;height:2px;background:var(--blue);color:var(--blue-700);font:600 9px var(--mono);letter-spacing:.04em;line-height:0;padding-left:10px;z-index:4;box-shadow:0 0 0 4px var(--blue-50)}
.itemrow.drop-before::before{top:-5px}
.itemrow.drop-after::after{bottom:-5px}
.itemrow.preview-target{border-color:var(--blue-200);background:#fff;box-shadow:0 0 0 3px var(--blue-50)}
.itemrow.reorder-ghost{position:absolute;z-index:8;pointer-events:none;margin:0;opacity:0;transform:translateY(8px) scale(.99);border:1.5px solid var(--blue);background:color-mix(in srgb,#fff 88%,var(--blue-50));box-shadow:0 14px 34px #155dfc26,0 2px 8px #10182814}
.itemrow.reorder-ghost.show{opacity:.82;transform:translateY(0) scale(1)}
.grip{width:32px;height:32px;flex:none;display:grid;place-items:center;color:var(--z600);border-radius:7px;cursor:grab;font-size:15px;letter-spacing:-4px;padding-right:4px;touch-action:none;user-select:none}
.grip:hover{color:var(--blue-700);background:var(--blue-50)}
.grip:active{cursor:grabbing}
.pointer-drag-ghost{position:fixed!important;z-index:100;pointer-events:none;margin:0!important;opacity:.94;transform:rotate(.35deg) scale(1.015);border-color:var(--blue)!important;background:#fff!important;box-shadow:0 18px 42px #10182824,0 4px 12px #155dfc22!important}
.itemrow .ty{font-family:var(--mono);font-size:9.5px;font-weight:600;color:var(--blue-700);width:52px;flex:none}
.itemrow.vrow .ty{color:var(--green-800)}
.itemrow .nm{font-size:13px;flex:1;min-width:0}
.itemrow .ops{display:flex;gap:2px}
.itemrow .ops button{color:var(--z600);width:32px;height:32px;display:grid;place-items:center;border-radius:6px;font-size:13px;transition:transform .16s,background .16s,color .16s}
.itemrow .ops button:hover:not(:disabled){background:var(--z200);color:var(--z700)}
.itemrow .ops button:active:not(:disabled){transform:scale(.88)}
.itemrow .ops button:disabled{opacity:.3;cursor:not-allowed}
.sr-only{position:absolute!important;width:1px!important;height:1px!important;padding:0!important;margin:-1px!important;overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important;border:0!important}
.addrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.addrow button{border:1px dashed var(--z300);border-radius:7px;padding:6px 11px;font-size:12px;color:var(--z600)}
.addrow button:hover{border-color:var(--blue);color:var(--blue-700)}
.pubwarn{font-size:12.5px;color:var(--red);margin-top:10px;display:none}
.pubwarn.show{display:block}
.b-set .ln{font-size:12.5px;color:var(--z600);padding:4px 0;border-bottom:1px solid var(--z100)}
.b-set .ln:last-child{border-bottom:none}
.b-set .ln b{color:var(--z900);font-weight:600}

/* ---------- leader ---------- */
.l-grid{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
.q-item{padding:16px 18px;border-bottom:1px solid var(--z100)}
.q-item:last-child{border-bottom:none}
.q-item .who{font-size:14px;font-weight:600}
.q-item .what{font-size:13px;color:var(--z600);margin:2px 0 4px}
.q-item .ctx{font-size:12.5px;color:var(--z500);background:var(--z50);border:1px solid var(--z100);border-radius:7px;padding:8px 12px;margin:8px 0 12px}
.q-item .row{display:flex;gap:9px;flex-wrap:wrap}
.q-item .row .btn{padding:8px 14px;font-size:13px}
.q-empty{padding:26px;text-align:center;color:var(--z600);font-size:13.5px;display:none}
.flag{display:flex;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--z100);font-size:13px}
.flag:last-child{border-bottom:none}
.flag .fdot{width:9px;height:9px;border-radius:99px;flex:none}

/* ---------- event drawer ---------- */
.drawer{position:static;background:var(--navy);color:#B8C1D1;z-index:40;font-family:var(--mono);font-size:11.5px}
.drawer .dhead{display:flex;align-items:center;gap:10px;padding:8px 18px;cursor:pointer}
.drawer .dhead .pulse{width:8px;height:8px;border-radius:99px;background:#4ADE80}
.drawer .dhead b{color:#fff;font-weight:600;letter-spacing:.06em;font-size:11px}
.drawer .dhead span{color:#AAB4C6;font-size:11px}
.supporting-copy{color:var(--z600)!important}
.drawer .dlog{display:none;max-height:150px;overflow:auto;padding:2px 18px 12px;border-top:1px solid #2A3444}
.drawer.open .dlog{display:block}
.drawer .ev{padding:3px 0;color:#8B95A7}
.drawer .ev b{color:#7EA4F4;font-weight:500}

@media(max-width:920px){
  .app{grid-template-columns:1fr}
  aside.side{display:none}
  .home-grid,.l-grid{grid-template-columns:1fr}
  .b-grid{grid-template-columns:1fr}
  .content{padding:16px;padding-bottom:70px}
  body.drawer-open .content{padding-bottom:70px}
  .q-item .row .btn{flex:1;text-align:center}
  .btn{padding:13px 18px;min-height:44px;font-size:13px}
  .feed .chk{width:44px;height:44px;border-radius:8px}
  .feed .item{padding:16px}
  .grip,.itemrow .ops button{width:44px;height:44px}
  .switch button{padding:10px 12px;min-height:44px}
  .itemrow .ops button,.grip{min-width:40px;min-height:40px}
  .reorder-hint{max-width:150px}
  button,input,select,.drawer .dhead{min-height:44px}
  main a,.why{display:inline-flex;align-items:center;min-height:44px}
}
@media(max-width:560px){
  .topbar{padding:10px 14px;flex-wrap:wrap}
  .topbar .crumb{display:none}
  .topbar .mini{display:none}
  .topbar .mock-badge{display:none}
  .topbar .spacer{display:none}
  .switch{flex:1 0 100%;min-width:0}
  .switch button{flex:1;padding:9px 4px;font-size:11px;min-height:44px}
  .itemrow{display:grid;grid-template-columns:44px 52px minmax(0,1fr);grid-template-areas:"grip type name" "ops ops ops";gap:6px 8px}
  .itemrow .grip{grid-area:grip}
  .itemrow .ty{grid-area:type;width:auto}
  .itemrow .nm{grid-area:name}
  .itemrow .ops{grid-area:ops;justify-content:flex-end}
  .reorder-head{display:block}
  .reorder-hint{display:block;max-width:none;text-align:left;margin-top:4px}
  .mastery-choices{flex-direction:column}
  .mastery-choices .btn{width:100%;min-width:0!important}
  .drawer{position:static}
  .content,body.drawer-open .content{padding-bottom:16px}
}
@media(prefers-reduced-motion:reduce){.itemrow,.itemrow .ops button,.toast,.reorder-ghost,.bar i{transition:none!important}.gatecard.show{animation:none}.pointer-drag-ghost{transform:none}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="logo"><div class="mark">P</div><div><b>PCx</b><span>Career Path Demo</span></div></div>
    <nav aria-label="Primary">
      <div class="grp">Agent's view</div>
      <a href="#" class="on" id="nav-home" onclick="setRole('agent');return false"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9.5 12 3l9 6.5V20a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 20Z"/><path d="M9 21.5V12h6v9.5"/></svg>Home</a>
      <a href="#" class="dim" aria-disabled="true" tabindex="-1"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 3.5h6a4 4 0 0 1 4 4v13a3 3 0 0 0-3-3H2Z"/><path d="M22 3.5h-6a4 4 0 0 0-4 4v13a3 3 0 0 1 3-3h7Z"/></svg>Resources</a>
      <a href="#" class="dim" aria-disabled="true" tabindex="-1"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>My Business</a>
      <a href="#" class="dim" aria-disabled="true" tabindex="-1"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>My Team</a>
      <div class="grp">Leadership</div>
      <a href="#" id="nav-leader" onclick="setRole('leader');return false"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m22 4-10 10.01-3-3"/></svg>Verifications</a>
      <a href="#" id="nav-builder" onclick="setRole('builder');return false"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg>Career Path Builder</a>
    </nav>
  </aside>
  <main>
    <div class="topbar">
      <span class="crumb" id="crumb">Agent · Sarah Johnson · Fundamentals</span>
      <span class="badge zinc mock-badge" style="flex:none" title="Single-file interactive mock. State lives in this page and resets on refresh.">mock demo · no backend</span>
      <div class="spacer"></div>
      <span class="mini" style="flex:none">View as</span>
      <div class="switch" role="group" aria-label="View as">
        <button id="sw-agent" class="on" aria-pressed="true" onclick="setRole('agent')">Sarah · Agent</button>
        <button id="sw-leader" aria-pressed="false" onclick="setRole('leader')">Joe · Leader</button>
        <button id="sw-builder" aria-pressed="false" onclick="setRole('builder')">Builder</button>
      </div>
    </div>
    <div class="content" id="view"></div>
  </main>
</div>

<div class="drawer" id="drawer">
  <div class="dhead" role="button" tabindex="0" aria-expanded="false" aria-controls="dlog" onclick="toggleDrawer()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleDrawer()}">
    <div class="pulse"></div><b>UNDER THE HOOD</b><span>every action is an event · tap to expand</span>
  </div>
  <div class="dlog" id="dlog"></div>
</div>
<div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

<script>
/* ============================================================
   Mock state. One source of truth; every view renders from it.
   ============================================================ */
const S = {
  role: 'agent',
  today: 'Demo day',
  // Listing Basics is Sarah's focus certification: 9 items, 7 done.
  cert: {
    name: 'Listing Basics Certification',
    quiz: { passed: true, score: 88, attempts: 2 },
    mode: 'quiz + leader approval',
    items: [
      { id:'c1', ty:'VIDEO',  nm:'Pricing a listing', done:true },
      { id:'c2', ty:'ACTION', nm:'Build a CMA for a real address', done:true },
      { id:'c3', ty:'VIDEO',  nm:'The listing presentation', done:true },
      { id:'c4', ty:'TASK',   taskId:'ct4', pri:'High', nm:'Draft your listing presentation deck', done:true },
      { id:'c5', ty:'VIDEO',  nm:'Handling the price objection', done:true },
      { id:'c6', ty:'TASK',   taskId:'ct6', pri:'High', nm:'Role-play the objection with a peer', done:true },
      { id:'c7', ty:'QUIZ',   nm:'Listing fundamentals · pass 80%', done:true },
      { id:'c9', ty:'ACTION', nm:'Schedule two listing appointments', done:false },
      { id:'c8', ty:'VERIFY', nm:'Listing presentation, live with your leader', done:false, waiting:false }
    ]
  },

/* ============================================================
   The ranking engine. This is the real policy from the
   solution design, running live. Not a hardcoded list.
   Urgency class first (the five tiers):
   Tier 1 overdue
   Tier 2 due today: scheduled/required first, then leader asks,
          then the agent's own (2.5 = unscheduled today items)
   Tier 3 leader asks / requirements due on a later date
   Tier 4 focus certification momentum · 5 personal/electives
   Inside a tier: the task's documented Priority
   (Critical/High/Medium/Low, from the Task Engine document) sorts
   comparable tasks, then due date, then leader-before-self.
   TASK-typed certification items retain Task Engine Priority;
   non-task learning items do not. Path sequence still selects
   the next certification action.
   ============================================================ */
const PRI_RANK = { Critical: 0, High: 1, Medium: 2, Low: 3 };
function rank() {
  const out = [];
  for (const t of S.tasks) {
    if (t.done) continue;
    let tier;
    if (t.due < 0) tier = 1;
    else if (t.due === 0 && (t.timed || t.src === 'required')) tier = 2;
    else if (t.due === 0) tier = 2.5;                    // due today, after timed items
    else if (t.src === 'leader' || t.src === 'required') tier = 3;  // asks and requirements never sink to personal
    else if (t.src === 'career') tier = t.focus ? 4 : 5; // career-path tasks: focus path rides tier 4, electives tier 5
    else tier = 5;
    // Career Path TASK items are Task Engine objects and retain Priority.
    // Non-task learning items stay in the certification structure.
    out.push({ kind:'task', tier, sort:[t.src==='career' ? 4 : (PRI_RANK[t.pri] ?? 2), t.due, t.src==='leader'?0:1], ref:t });
  }
  // focus certification: next workable item (waiting-on-leader is not an action)
  const next = S.cert.items.find(i => !i.done && !i.waiting);
  if (next) {
    const workableLeft = S.cert.items.filter(i => !i.done && !i.waiting).length;
    const gateInReach = workableLeft === 1;
    // gate-in-reach tops the career tier (tier 4), exactly as the design's tier table says;
    // it never jumps above tier 3 leader asks or required activities
    out.push({ kind:'cert', tier: 4, sort:[gateInReach ? -1 : 0, 0, 0], ref: next, gateInReach });
  }
  out.sort((a,b) => a.tier - b.tier || a.sort[0]-b.sort[0] || a.sort[1]-b.sort[1] || (a.sort[2]||0)-(b.sort[2]||0));
  return out;
}

const tierName = f => {
  const t = f.tier;
  if (t === 1) return 'T1 · overdue';
  if (t < 3) return f.ref && f.ref.src === 'leader' ? 'T2 · leader · today' : 'T2 · today';
  if (t === 3) return f.ref && f.ref.src === 'required' ? 'T3 · required' : 'T3 · leader';
  if (t < 4.1) return 'T4 · career path';
  return f.ref && f.ref.src === 'career' ? 'T5 · elective' : 'T5 · personal';
};
const priTag = ref => ref && ref.pri ? ' · ' + ref.pri.toLowerCase() + ' priority' : '';

/* ---------- events ---------- */
function escapeHTML(value) {
  return String(value).replace(/[&<>"']/g, char => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  })[char]);
}
function emit(name, detail) {
  const time = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  S.events.push(`${time}  <b>${name}</b>  ${detail}`);
  const log = document.getElementById('dlog');
  log.innerHTML = S.events.slice(-24).map(e => `<div class="ev">${e}</div>`).join('');
  log.scrollTop = log.scrollHeight;
}
function toast(msg) {
  const el = document.getElementById('toast');
  clearTimeout(el._t); cancelAnimationFrame(el._announceFrame);
  el.classList.remove('show'); el.textContent = '';
  el._announceFrame = requestAnimationFrame(() => {
    el.textContent = msg; el.classList.add('show');
    el._t = setTimeout(() => el.classList.remove('show'), 2600);
  });
}

function render() {
  const v = document.getElementById('view');
  const active = document.activeElement;
  const restore = active && v.contains(active) ? {
    id: active.id || '',
    label: active.getAttribute('aria-label') || '',
    text: active.textContent.trim(),
    tag: active.tagName
  } : null;
  v.innerHTML = S.role==='agent' ? agentView() : S.role==='leader' ? leaderView() : builderView();
  document.getElementById('crumb').textContent =
    S.role==='agent' ? 'Agent · Sarah Johnson · '+(S.stageAdvanced?'Mastery Skills':'Fundamentals') :
    S.role==='leader' ? 'Leadership · Joe · Scottsdale office' : 'Leadership · Career Path Builder';
  ['agent','leader','builder'].forEach(r => {
    const sw = document.getElementById('sw-'+r);
    const on = S.role===r;
    sw.classList.toggle('on', on);
    sw.setAttribute('aria-pressed', on ? 'true' : 'false');
  });
  document.getElementById('nav-home').classList.toggle('on', S.role==='agent');
  document.getElementById('nav-leader').classList.toggle('on', S.role==='leader');
  document.getElementById('nav-builder').classList.toggle('on', S.role==='builder');
  if (restore) requestAnimationFrame(() => {
    let target = restore.id ? document.getElementById(restore.id) : null;
    const candidates = Array.from(v.querySelectorAll(restore.tag));
    if (!target && restore.label) target = candidates.find(el => el.getAttribute('aria-label') === restore.label);
    if (!target && !restore.label && restore.text) target = candidates.find(el => el.textContent.trim() === restore.text);
    if (!target) {
      target = v.querySelector('h1');
      if (target) target.setAttribute('tabindex', '-1');
    }
    if (target) target.focus({preventScroll:true});
  });
}

let pointerDrag = { from:null, target:null, after:false, pointerId:null, handle:null, row:null, ghost:null, offsetX:0, offsetY:0 };
function builderRows(){ return Array.from(document.querySelectorAll('#reorder-list > .itemrow:not(.reorder-ghost)')); }
function clearMovePreview(){

function showMovePreview(idx,dir){
  clearMovePreview();
  const rows = builderRows();
  const target = rows[idx + dir];
  const source = rows[idx];
  const list = document.getElementById('reorder-list');
  if (!source || !target || !list) return;
  const ghost = source.cloneNode(true);
  ghost.className = 'itemrow reorder-ghost' + (source.classList.contains('vrow') ? ' vrow' : '');
  ghost.setAttribute('aria-hidden', 'true');
  ghost.inert = true;
  ghost.removeAttribute('draggable');
  ghost.querySelector('.grip')?.remove();
  ghost.querySelector('.ops')?.remove();
  ghost.style.top = target.offsetTop + 'px';
  ghost.style.left = target.offsetLeft + 'px';
  ghost.style.width = target.offsetWidth + 'px';
  target.classList.add('preview-target');
  list.appendChild(ghost);
  requestAnimationFrame(() => ghost.classList.add('show'));
}
function announceReorder(item,from,position,method){
  requestAnimationFrame(() => {
    const live = document.getElementById('reorder-live');
    if (live) live.textContent = item.nm + ' moved from position ' + (from + 1) + ' to ' + (position + 1)
      + ' of ' + draftItems().length + ' by ' + method + '. Draft only; live version unchanged.';
  });
}
function reorderItem(from,to,method){
  const source = S.draft || S.cert.items;
  if (from === to || from < 0 || to < 0 || from >= source.length || to >= source.length) return;
  draftify();
  const items = draftItems();
  const [item] = items.splice(from,1);
  items.splice(to,0,item);
  emit('builder.item_reordered', item.ty+' "'+item.nm+'" · position '+(to+1)+' · '+method+' · draft only');
  render();
  announceReorder(item,from,to,method);
  toast(item.nm+' moved to position '+(to+1)+'. The live version is unchanged.');
}
function moveItem(idx,dir){

  if (to < 0 || to >= (S.draft || S.cert.items).length) return;
  reorderItem(idx,to,'arrow control');
  requestAnimationFrame(() => {
    const moved = document.querySelector(`[data-index="${to}"]`);
    const preferred = moved?.querySelector(dir < 0 ? '.move-up' : '.move-down');
    const fallback = moved?.querySelector(dir < 0 ? '.move-down' : '.move-up');
    (preferred && !preferred.disabled ? preferred : fallback)?.focus();
  });
}
function startPointerReorder(event,idx){
  if (event.pointerType === 'mouse' && event.button !== 0) return;
  event.preventDefault();
  clearMovePreview();
  const row = builderRows()[idx];
  if (!row) return;
  const rect = row.getBoundingClientRect();
  const ghost = row.cloneNode(true);
  ghost.className = 'itemrow pointer-drag-ghost' + (row.classList.contains('vrow') ? ' vrow' : '');
  ghost.setAttribute('aria-hidden', 'true');
  ghost.inert = true;
  ghost.removeAttribute('data-index');
  ghost.removeAttribute('aria-label');
  ghost.querySelector('.grip')?.removeAttribute('onpointerdown');
  ghost.querySelector('.ops')?.remove();
  ghost.style.width = rect.width + 'px';
  ghost.style.height = rect.height + 'px';
  ghost.style.left = rect.left + 'px';
  ghost.style.top = rect.top + 'px';
  document.body.appendChild(ghost);
  pointerDrag = {
    from:idx, target:idx, after:false, pointerId:event.pointerId, handle:event.currentTarget,
    row, ghost, offsetX:event.clientX-rect.left, offsetY:event.clientY-rect.top
  };
  event.currentTarget.setPointerCapture(event.pointerId);
  event.currentTarget.addEventListener('pointermove', movePointerReorder);
  event.currentTarget.addEventListener('pointerup', commitPointerReorder, { once:true });
  event.currentTarget.addEventListener('pointercancel', cancelPointerReorder, { once:true });
  window.addEventListener('keydown', cancelPointerOnEscape);
  row.classList.add('dragging');
}
function movePointerReorder(event){
  if (pointerDrag.from === null || event.pointerId !== pointerDrag.pointerId) return;
  event.preventDefault();
  pointerDrag.ghost.style.left = (event.clientX-pointerDrag.offsetX) + 'px';
  pointerDrag.ghost.style.top = (event.clientY-pointerDrag.offsetY) + 'px';
  const edge = 72;
  if (event.clientY < edge) window.scrollBy({ top:-12, behavior:'auto' });
  if (event.clientY > window.innerHeight-edge) window.scrollBy({ top:12, behavior:'auto' });
  builderRows().forEach(el => el.classList.remove('drop-before','drop-after'));
  const list = document.getElementById('reorder-list');
  const listRect = list?.getBoundingClientRect();
  if (!listRect || event.clientX < listRect.left || event.clientX > listRect.right || event.clientY < listRect.top-18 || event.clientY > listRect.bottom+18) {
    pointerDrag.target = null;
    return;
  }
  const candidates = builderRows().filter(row => row !== pointerDrag.row);
  let target = candidates.find(row => event.clientY < row.getBoundingClientRect().top + row.offsetHeight/2);
  let after = false;
  if (!target) { target = candidates[candidates.length-1] || pointerDrag.row; after = true; }
  target.classList.add(after ? 'drop-after' : 'drop-before');
  pointerDrag.target = Number(target.dataset.index);
  pointerDrag.after = after;
}
function finishPointerReorder(commit,restoreFocus){
  const state = pointerDrag;
  if (state.handle) {
    state.handle.removeEventListener('pointermove', movePointerReorder);
    state.handle.removeEventListener('pointerup', commitPointerReorder);
    state.handle.removeEventListener('pointercancel', cancelPointerReorder);
    try { if (state.handle.hasPointerCapture(state.pointerId)) state.handle.releasePointerCapture(state.pointerId); } catch (_) {}
  }
  window.removeEventListener('keydown', cancelPointerOnEscape);
  state.ghost?.remove();
  builderRows().forEach(el => el.classList.remove('dragging','drop-before','drop-after'));
  pointerDrag = { from:null, target:null, after:false, pointerId:null, handle:null, row:null, ghost:null, offsetX:0, offsetY:0 };
  if (!commit || state.target === null) {
    const live = document.getElementById('reorder-live');
    if (live) live.textContent = 'Reorder cancelled. Item order is unchanged.';
    if (restoreFocus) {
      const row = document.querySelector(`[data-index="${state.from}"]`);
      row?.querySelector('.move-down:not(:disabled),.move-up:not(:disabled)')?.focus();
    }
    return;
  }
  let to = state.target + (state.after ? 1 : 0);
  if (to > state.from) to--;
  reorderItem(state.from,to,'pointer drag and drop');
}
function commitPointerReorder(event){
  event.preventDefault();
  finishPointerReorder(true);
}
function cancelPointerReorder(){ finishPointerReorder(false); }
function cancelPointerOnEscape(event){
  if (event.key === 'Escape') {
    event.preventDefault();
    finishPointerReorder(false,true);
  }
}

  const agentTask = name => S.agents[name].tasks.push({ nm, m:meta+' · '+pri.toLowerCase()+' priority', done:false });
  if (who === 'group') {
    // real fan-out: one task instance per agent, all in state; group membership
    // is dynamic, so an advanced agent is no longer in the Fundamentals cohort
    const cohort = S.stageAdvanced ? ['Mike Torres','Dana Wells'] : ['Sarah Johnson','Mike Torres','Dana Wells'];
    if (!S.stageAdvanced) sarahTask();
    agentTask('Mike Torres'); agentTask('Dana Wells');
    cohort.forEach(a => emit('task.assigned', '"'+nm+'" · to '+a+' · one instance each'));
    toast(S.stageAdvanced
      ? 'Fanned out: 2 real instances. Sarah advanced to Mastery Skills, so she is no longer in the Fundamentals group; tap "inspect" to see the task in Mike’s and Dana’s lists.'
      : 'Fanned out: 3 real instances. It is in Sarah’s feed now; tap "inspect" under the counts to see the same task in Mike’s and Dana’s lists.');
  } else if (who === 'sarah') {
    sarahTask();
    emit('task.assigned', '"'+nm+'" · to Sarah Johnson · by Joe');
    toast(due === 0 ? 'Assigned. It is already in Sarah’s ranked feed.' : 'Assigned for later this week. Watch it rank as a T3 leader ask in Sarah’s feed.');
  } else {
    agentTask('Mike Torres');
    emit('task.assigned', '"'+nm+'" · to Mike Torres · by Joe');
    toast('Assigned to Mike. His count moved because his task list did; tap "inspect" to see it there.');
  }
  emit('home.feed.reordered', 'recipients re-ranked');
  inp.value = '';
  render();
}
function addPath(){
  S.newPaths.push('New Certification ' + (S.newPaths.length + 2));
  emit('builder.path_added', 'Fundamentals · elective · draft');
  toast('Certification added to the stage. Compose its items, then publish.');
  render();
}

emit('demo.loaded', 'mock data · every view renders from one state object');
render();
</script>
