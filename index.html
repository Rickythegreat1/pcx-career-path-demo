<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCx Career Path · Working Demo</title>
<meta name="description" content="Interactive demo of the PCx Career Path system: the ranked Agent Home, the Career Path Builder, and leader verification, running as one connected loop.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* PCx V2 design language: zinc neutrals, one action blue, navy shell.
   Single file, no dependencies, mock data only. */
:root {
  --z50:#FAFAFA; --z100:#F4F4F5; --z200:#E4E4E7; --z300:#D4D4D8; --z400:#A1A1AA;
  --z500:#71717A; --z600:#52525B; --z700:#3F3F46; --z800:#27272A; --z900:#18181B;
  --blue:#155DFC; --blue-700:#1447E6; --blue-50:#EFF6FF; --blue-200:#BFDBFE;
  --blue-bright:#2B7FFF; --navy2:#1E2939;
  --green:#00A63E; --green-100:#DCFCE7; --green-800:#166534;
  --amber:#E17100; --amber-100:#FFEDD4; --amber-800:#92400E;
  --red:#E7000B; --navy:#101828;
  --sans:"Inter",-apple-system,"Segoe UI","Helvetica Neue",Arial,sans-serif;
  --mono:"SF Mono",Menlo,Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--z100);color:var(--z900);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;font-size:14px}

/* ---------- app frame ---------- */
.app{display:grid;grid-template-columns:256px 1fr;min-height:100vh}
aside.side{background:var(--navy);color:#fff;padding:20px 16px;display:flex;flex-direction:column;gap:2px}
.side .logo{display:flex;align-items:center;gap:10px;padding:4px 10px 18px}
.side .logo .mark{width:40px;height:40px;background:var(--blue);border-radius:8px;display:grid;place-items:center;font-weight:700;font-size:15px}
.side .logo b{font-size:14px}
.side .logo span{display:block;font-size:11px;color:#8B95A7}
.side .grp{font-size:12px;font-weight:600;letter-spacing:.05em;color:#6B7689;padding:14px 10px 6px;text-transform:uppercase}
.side a{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;color:#A7B0C0;font-size:14px;font-weight:500;text-decoration:none}
.side a.on{background:var(--navy2);color:#fff}
.side a.dim{opacity:.45;pointer-events:none}
.side a svg{width:17px;height:17px;flex:none;fill:none;stroke:currentColor;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round;opacity:.9}
main{min-width:0}
.topbar{background:#fff;border-bottom:1px solid var(--z200);padding:10px 26px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:20}
.topbar .crumb{font-size:13px;color:var(--z500)}
.topbar .spacer{flex:1}
.switch{display:flex;background:var(--z100);border:1px solid var(--z200);border-radius:9px;padding:3px;gap:2px}
.switch button{padding:6px 13px;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--z500)}
.switch button.on{background:#fff;color:var(--z900);box-shadow:0 1px 2px #0002}
.content{padding:32px 32px 26px;max-width:1120px}

/* ---------- shared bits ---------- */
.h-row{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:4px;flex-wrap:wrap}
h1{font-size:20px;font-weight:700;letter-spacing:-.01em}
.sub{color:var(--z500);font-size:12px;margin-bottom:20px}
.card{background:#fff;border:1px solid var(--z200);border-radius:12px}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;letter-spacing:.01em}
.badge.green{background:var(--green-100);color:var(--green-800)}
.badge.amber{background:var(--amber-100);color:var(--amber-800)}
.badge.blue{background:var(--blue-50);color:var(--blue-700)}
.badge.zinc{background:var(--z100);color:var(--z600);border:1px solid var(--z200)}
.btn{background:var(--blue);color:#fff;font-weight:600;font-size:12px;padding:8px 14px;border-radius:8px}
.btn:hover{background:var(--blue-700)}
.btn.ghost{background:#fff;color:var(--z700);border:1px solid var(--z200);font-weight:500}
.btn.ghost:hover{background:var(--z50)}
.btn.dark{background:var(--z900)}
.btn.dark:hover{background:var(--z800)}
.btn:disabled{background:var(--z300);cursor:not-allowed}
.mini{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--z400)}
.toast{position:fixed;bottom:64px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--z900);color:#fff;padding:10px 18px;border-radius:9px;font-size:13.5px;opacity:0;transition:.25s;z-index:60;pointer-events:none;max-width:92vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---------- agent home ---------- */
.home-grid{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
.hero{border:1.5px solid var(--blue);background:var(--blue-50);border-radius:12px;padding:18px 20px;margin-bottom:18px;position:relative}
.hero .mini{color:var(--blue-700)}
.hero h3{font-size:17px;margin:6px 0 3px;letter-spacing:-.005em}
.hero .meta{font-size:13px;color:var(--z600)}
.hero .act{margin-top:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.why{font-size:12px;color:var(--blue-700);text-decoration:underline dotted;cursor:pointer}
.whybox{display:none;margin-top:10px;background:#fff;border:1px solid var(--blue-200);border-radius:8px;padding:10px 14px;font-size:12.5px;color:var(--z600)}
.whybox.open{display:block}
.whybox b{font-family:var(--mono);font-size:10.5px;color:var(--blue-700)}
.feed .item{display:flex;align-items:center;gap:13px;padding:13px 16px;border-bottom:1px solid var(--z100)}
.feed .item:last-child{border-bottom:none}
.feed .chk{width:16px;height:16px;border:1.5px solid var(--z300);border-radius:4px;flex:none;cursor:pointer;display:grid;place-items:center;color:#fff;font-size:11px}
.feed .item.done .chk{background:var(--blue-bright);border-color:var(--blue-bright)}
.feed .item.done .t{text-decoration:line-through;color:var(--z400)}
.feed .grow{min-width:0;flex:1}
.feed .t{font-size:13px;font-weight:500}
.feed .m{font-size:12px;color:var(--z500)}
.feed .item.waiting{background:var(--z50)}
.feed .item.waiting .chk{border-style:dashed;cursor:default;color:var(--z400)}
.tierchip{font-family:var(--mono);font-size:9.5px;color:var(--z400);flex:none}
.rail .card{padding:15px 17px;margin-bottom:14px}
.rail h4{font-size:13.5px;font-weight:600;margin-bottom:8px}
.bar{height:4px;background:var(--z100);border-radius:99px;overflow:hidden;margin:8px 0 6px}
.bar i{display:block;height:100%;background:var(--blue-bright);border-radius:99px;transition:width .5s}
.rail .ln{font-size:12.5px;color:var(--z600);padding:3px 0}
.rail .ln a{display:inline-block;padding:7px 9px;margin:-5px -3px;border-radius:6px}
.rail .ln a:active{background:var(--z100)}
.stage-ln{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:3px 0;color:var(--z600)}
.stage-ln .sdot{width:8px;height:8px;border-radius:99px;background:var(--z300);flex:none}
.stage-ln.done .sdot{background:var(--green)}
.stage-ln.cur .sdot{background:var(--blue)}
.stage-ln.cur{color:var(--z900);font-weight:600}
.gatecard{border:1.5px solid var(--green);background:var(--green-100);border-radius:12px;padding:16px 18px;margin-bottom:18px;display:none}
.gatecard.show{display:block;animation:pop .4s}
@keyframes pop{0%{transform:scale(.97);opacity:0}100%{transform:scale(1);opacity:1}}
.gatecard h3{font-size:16px;color:var(--green-800)}
.gatecard p{font-size:13px;color:var(--green-800);opacity:.85;margin-top:3px}

/* ---------- builder ---------- */
.b-grid{display:grid;grid-template-columns:250px 1fr 250px;gap:16px;align-items:start}
.b-col .card{padding:14px}
.b-col h4{font-size:13px;font-weight:700;margin-bottom:10px}
.stg{padding:9px 10px;border-radius:8px;margin-bottom:4px}
.stg .nm{font-size:13.5px;font-weight:600}
.stg .ct{font-size:11.5px;color:var(--z500)}
.path{padding:8px 10px 8px 22px;border-radius:7px;font-size:13px;color:var(--z600);cursor:pointer;display:flex;justify-content:space-between;gap:8px;align-items:center}
.path.sel{background:var(--blue-50);color:var(--blue-700);font-weight:600}
.path .badge{font-size:9.5px;padding:1px 7px}
.itemrow{display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid var(--z200);border-radius:8px;margin-bottom:7px;background:var(--z50)}
.itemrow.vrow{background:var(--green-100);border-color:#86EFAC}
.itemrow .ty{font-family:var(--mono);font-size:9.5px;font-weight:600;color:var(--blue-700);width:52px;flex:none}
.itemrow.vrow .ty{color:var(--green-800)}
.itemrow .nm{font-size:13px;flex:1;min-width:0}
.itemrow .ops{display:flex;gap:2px}
.itemrow .ops button{color:var(--z400);padding:2px 6px;border-radius:5px;font-size:13px}
.itemrow .ops button:hover{background:var(--z200);color:var(--z700)}
.addrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.addrow button{border:1px dashed var(--z300);border-radius:7px;padding:6px 11px;font-size:12px;color:var(--z600)}
.addrow button:hover{border-color:var(--blue);color:var(--blue-700)}
.pubwarn{font-size:12.5px;color:var(--red);margin-top:10px;display:none}
.pubwarn.show{display:block}
.b-set .ln{font-size:12.5px;color:var(--z600);padding:4px 0;border-bottom:1px solid var(--z100)}
.b-set .ln:last-child{border-bottom:none}
.b-set .ln b{color:var(--z900);font-weight:600}

/* ---------- leader ---------- */
.l-grid{display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start}
.q-item{padding:16px 18px;border-bottom:1px solid var(--z100)}
.q-item:last-child{border-bottom:none}
.q-item .who{font-size:14px;font-weight:600}
.q-item .what{font-size:13px;color:var(--z600);margin:2px 0 4px}
.q-item .ctx{font-size:12.5px;color:var(--z500);background:var(--z50);border:1px solid var(--z100);border-radius:7px;padding:8px 12px;margin:8px 0 12px}
.q-item .row{display:flex;gap:9px;flex-wrap:wrap}
.q-item .row .btn{padding:8px 14px;font-size:13px}
.q-empty{padding:26px;text-align:center;color:var(--z400);font-size:13.5px;display:none}
.flag{display:flex;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--z100);font-size:13px}
.flag:last-child{border-bottom:none}
.flag .fdot{width:9px;height:9px;border-radius:99px;flex:none}

/* ---------- event drawer ---------- */
.drawer{position:fixed;bottom:0;left:0;right:0;background:var(--navy);color:#B8C1D1;z-index:40;font-family:var(--mono);font-size:11.5px}
.drawer .dhead{display:flex;align-items:center;gap:10px;padding:8px 18px;cursor:pointer}
.drawer .dhead .pulse{width:8px;height:8px;border-radius:99px;background:#4ADE80}
.drawer .dhead b{color:#fff;font-weight:600;letter-spacing:.06em;font-size:11px}
.drawer .dhead span{color:#67718A;font-size:10.5px}
.drawer .dlog{display:none;max-height:150px;overflow:auto;padding:2px 18px 12px;border-top:1px solid #2A3444}
.drawer.open .dlog{display:block}
.drawer .ev{padding:3px 0;color:#8B95A7}
.drawer .ev b{color:#7EA4F4;font-weight:500}

@media(max-width:920px){
  .app{grid-template-columns:1fr}
  aside.side{display:none}
  .home-grid,.l-grid{grid-template-columns:1fr}
  .b-grid{grid-template-columns:1fr}
  .content{padding:16px;padding-bottom:70px}
  .q-item .row .btn{flex:1;text-align:center}
  .btn{padding:13px 18px;min-height:44px;font-size:13px}
  .feed .chk{width:22px;height:22px;border-radius:6px}
  .feed .item{padding:16px}
  .switch button{padding:10px 12px;min-height:40px}
}
@media(max-width:560px){
  .topbar{padding:10px 14px}
  .topbar .crumb{display:none}
  .switch{flex:1;min-width:0}
  .switch button{flex:1;padding:9px 4px;font-size:11px;min-height:40px}
}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="logo"><div class="mark">P</div><div><b>PCx</b><span>Career Path Demo</span></div></div>
    <div class="grp">Agent's view</div>
    <a href="#" class="on" id="nav-home" onclick="setRole('agent');return false"><svg viewBox="0 0 24 24"><path d="M3 9.5 12 3l9 6.5V20a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 20Z"/><path d="M9 21.5V12h6v9.5"/></svg>Home</a>
    <a href="#" class="dim"><svg viewBox="0 0 24 24"><path d="M2 3.5h6a4 4 0 0 1 4 4v13a3 3 0 0 0-3-3H2Z"/><path d="M22 3.5h-6a4 4 0 0 0-4 4v13a3 3 0 0 1 3-3h7Z"/></svg>Resources</a>
    <a href="#" class="dim"><svg viewBox="0 0 24 24"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>My Business</a>
    <a href="#" class="dim"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>My Team</a>
    <div class="grp">Leadership</div>
    <a href="#" id="nav-leader" onclick="setRole('leader');return false"><svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m22 4-10 10.01-3-3"/></svg>Verifications</a>
    <a href="#" id="nav-builder" onclick="setRole('builder');return false"><svg viewBox="0 0 24 24"><path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg>Career Path Builder</a>
  </aside>
  <main>
    <div class="topbar">
      <span class="crumb" id="crumb">Agent · Sarah Johnson · Fundamentals</span>
      <div class="spacer"></div>
      <span class="mini" style="flex:none">View as</span>
      <div class="switch" role="tablist" aria-label="View as">
        <button id="sw-agent" class="on" onclick="setRole('agent')">Sarah · Agent</button>
        <button id="sw-leader" onclick="setRole('leader')">Joe · Leader</button>
        <button id="sw-builder" onclick="setRole('builder')">Builder</button>
      </div>
    </div>
    <div class="content" id="view"></div>
  </main>
</div>

<div class="drawer" id="drawer">
  <div class="dhead" onclick="document.getElementById('drawer').classList.toggle('open')">
    <div class="pulse"></div><b>UNDER THE HOOD</b><span>every action is an event · tap to expand</span>
  </div>
  <div class="dlog" id="dlog"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   Mock state. One source of truth; every view renders from it.
   ============================================================ */
const S = {
  role: 'agent',
  today: 'Tue Jul 7',
  // Listing Basics is Sarah's focus certification: 9 items, 7 done.
  cert: {
    name: 'Listing Basics Certification',
    quiz: { passed: true, score: 88, attempts: 2 },
    mode: 'quiz + leader approval',
    items: [
      { id:'c1', ty:'VIDEO',  nm:'Pricing a listing', done:true },
      { id:'c2', ty:'ACTION', nm:'Build a CMA for a real address', done:true },
      { id:'c3', ty:'VIDEO',  nm:'The listing presentation', done:true },
      { id:'c4', ty:'TASK',   nm:'Draft your listing presentation deck', done:true },
      { id:'c5', ty:'VIDEO',  nm:'Handling the price objection', done:true },
      { id:'c6', ty:'TASK',   nm:'Role-play the objection with a peer', done:true },
      { id:'c7', ty:'QUIZ',   nm:'Listing fundamentals · pass 80%', done:true },
      { id:'c8', ty:'VERIFY', nm:'Listing presentation, live with your leader', done:false, waiting:false },
      { id:'c9', ty:'ACTION', nm:'Schedule two listing appointments', done:false }
    ]
  },
  buyerBasics: { name:'Buyer Basics Certification', done:true },
  tasks: [
    { id:'t1', src:'personal', nm:'Update CRM pipeline stages', m:'personal task · was due yesterday', due:-1, done:false },
    { id:'t2', src:'required', nm:'Team training call', m:'required · today 10:00a · Zoom', due:0, timed:true, done:false },
    { id:'t3', src:'leader',   nm:'Call five database contacts', m:'assigned by Joe · due today', due:0, done:false },
    { id:'t4', src:'personal', nm:'Order open house signs', m:'personal task · due Friday', due:3, done:false },
    { id:'t5', src:'required', nm:'Compliance attestation for Q3', m:'required · due Thursday', due:2, done:false }
  ],
  t3690: { day:34, pct:62 },
  dbEnrolled: false,
  masteryStarted: false,
  ver: 3,
  lastLive: 2,
  newPaths: [],
  // Real per-agent state. Assignments create task objects here, not counter bumps.
  agents: {
    'Mike Torres': { cert:'Buyer Basics Certification', certDone:5, certTotal:9, tasks:[
      { nm:'Prep buyer consult checklist', m:'assigned by Joe', done:false },
      { nm:'Shadow a closing at title', m:'self-assigned', done:false },
      { nm:'Update lead sheet', m:'self-assigned', done:false }
    ]},
    'Dana Wells': { cert:'Listing Basics Certification', certDone:3, certTotal:9, tasks:[
      { nm:'Watch: Pricing a listing', m:'certification item', done:false },
      { nm:'Book 1:1 with Joe', m:'self-assigned', done:false }
    ]}
  },
  rosterOpen: false,
  published: false,
  quizOpen: false,
  queue: [
    { id:'q0', who:'Mike Torres', what:'Buyer Basics · Build a CMA for a real address', ctx:'Submitted a CMA for 4482 E Palo Verde Dr. Comps chosen from the last 90 days, adjustments noted in the file.', done:false }
  ],
  gateReady: false,
  stageAdvanced: false,
  events: []
};

/* ============================================================
   The ranking engine. This is the real tier logic from the
   solution design, running live. Not a hardcoded list.
   Tier 1 overdue
   Tier 2 due today: scheduled/required first, then leader asks,
          then the agent's own (2.5 = unscheduled today items)
   Tier 3 leader asks due on a later date
   Tier 4 focus certification momentum · 5 personal/optional
   ============================================================ */
function rank() {
  const out = [];
  for (const t of S.tasks) {
    if (t.done) continue;
    let tier;
    if (t.due < 0) tier = 1;
    else if (t.due === 0 && (t.timed || t.src === 'required')) tier = 2;
    else if (t.due === 0) tier = 2.5;                    // due today, after timed items
    else if (t.src === 'leader' || t.src === 'required') tier = 3;  // asks and requirements never sink to personal
    else tier = 5;
    out.push({ kind:'task', tier, sort:[t.due, t.src==='leader'?0:1], ref:t });
  }
  // focus certification: next workable item (waiting-on-leader is not an action)
  const next = S.cert.items.find(i => !i.done && !i.waiting);
  if (next) {
    const workableLeft = S.cert.items.filter(i => !i.done && !i.waiting).length;
    const gateInReach = workableLeft === 1;
    out.push({ kind:'cert', tier: gateInReach ? 3.9 : 4, sort:[0,0], ref: next, gateInReach });
  }
  out.sort((a,b) => a.tier - b.tier || a.sort[0]-b.sort[0] || a.sort[1]-b.sort[1]);
  return out;
}

const tierName = f => {
  const t = f.tier;
  if (t === 1) return 'T1 · overdue';
  if (t < 3) return f.ref && f.ref.src === 'leader' ? 'T2 · leader · today' : 'T2 · today';
  if (t === 3) return f.ref && f.ref.src === 'required' ? 'T3 · required' : 'T3 · leader';
  return t < 4.1 ? 'T4 · career path' : 'T5 · personal';
};

/* ---------- events ---------- */
function emit(name, detail) {
  const time = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  S.events.unshift(`${time}  <b>${name}</b>  ${detail}`);
  const log = document.getElementById('dlog');
  log.innerHTML = S.events.slice(0, 24).map(e => `<div class="ev">${e}</div>`).join('');
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2600);
}

/* ============================================================
   Views
   ============================================================ */
function agentView() {
  const feed = rank();
  const hero = feed[0];
  const rest = feed.slice(1);
  const certDone = S.cert.items.filter(i => i.done).length;
  const waitingItem = S.cert.items.find(i => i.waiting);

  const heroHtml = hero ? `
    <div class="hero">
      <div class="mini">&ldquo;What should I do today?&rdquo; &middot; your answer</div>
      <h3>${hero.ref.nm}</h3>
      <div class="meta">${hero.kind==='cert'
        ? `${S.cert.name} · item ${S.cert.items.indexOf(hero.ref)+1} of ${S.cert.items.length}`+(hero.ref.note?` · sent back by Joe: &ldquo;${hero.ref.note}&rdquo;`:'')
        : hero.ref.m}</div>
      <div class="act">
        ${hero.gateInReach ? '<span class="badge green">GATE IN REACH</span>' : ''}
        <button class="btn" onclick="completeTop()">${hero.kind==='cert' && hero.ref.ty==='VERIFY' ? 'Done, submit for verification' : 'Mark complete'}</button>
        <span class="why" onclick="this.parentElement.nextElementSibling.classList.toggle('open')">why is this first?</span>
      </div>
      <div class="whybox"><b>${tierName(hero)}</b> · ${

  ['agent','leader','builder'].forEach(r => {

  });
  document.getElementById('nav-home').classList.toggle('on', S.role==='agent');
  document.getElementById('nav-leader').classList.toggle('on', S.role==='leader');

function setRole(r){ S.role = r; render(); }

function completeTop(){
  const top = rank()[0];
  if (top) completeItem(top.kind, top.ref.id);
}
function completeItem(kind, id){
  if (kind === 'task') {
    const t = S.tasks.find(t => t.id === id);
    t.done = true;
    emit('task.completed', `"${t.nm}" · Sarah Johnson`);
    emit('home.feed.reordered', 'Sarah Johnson · rank() re-ran');
    toast('Done. The feed re-ranked around what’s next.');
  } else {
    const i = S.cert.items.find(i => i.id === id);
    if (i.ty === 'VERIFY') {
      i.waiting = true;
      // a resubmission replaces any earlier entry for the same person and item, never duplicates it
      S.queue = S.queue.filter(q => !(q.who === 'Sarah Johnson' && q.itemId === i.id));
      S.queue.push({ id:'qS', itemId: i.id, who:'Sarah Johnson', what:'Listing Basics · Listing presentation, live with leader',
        ctx:'Delivered the full listing presentation on the office call. Recording attached. Quiz already passed at 88% (2 attempts, logged).'
          + (i.note ? ' Resubmission after your note: "' + i.note + '"' : ''), done:false });
      emit('item.submitted_for_verification', '"'+i.nm+'" · notifies Joe now');
      toast('Submitted. Joe was notified; waiting on verification is not your action.');
    } else {
      i.done = true;
      emit('task.completed', `certification item "${i.nm}"`);
      checkCert();
    }
    emit('home.feed.reordered', 'Sarah Johnson · rank() re-ran');
  }
  render();
}
function verify(qid){
  const q = S.queue.find(q => q.id === qid);
  q.done = true;
  emit('item.verified', `${q.who} · by Joe · audited`);
  if (qid === 'qS') {
    const i = S.cert.items.find(i => i.id === 'c8');
    i.waiting = false; i.done = true;
    emit('home.feed.reordered', 'Sarah Johnson · verified item unblocks the gate path');
    checkCert();
    toast('Verified. Sarah’s Home just reordered; the gate item is now on top.');
  } else {
    const a = S.agents[q.who];
    a.certDone++;
    emit('certification.progressed', `${q.who} · ${a.cert} → ${a.certDone}/${a.certTotal}`);
    toast(`Verified. ${q.who}'s ${a.cert.replace(' Certification','')} moved to ${a.certDone}/${a.certTotal}; inspect the roster to see it.`);
  }
  render();
}
function sendBack(qid){
  const q = S.queue.find(q => q.id === qid);
  const note = prompt('Note back to '+q.who+':', 'Tighten the comps to the same subdivision, then resubmit.');
  if (note === null) return;
  q.done = true;
  if (qid === 'qS') {
    const i = S.cert.items.find(i => i.id==='c8');
    i.waiting = false;
    i.note = note;   // the agent sees the note on the item itself, not in a void
  } else {
    S.agents[q.who].tasks.push({ nm:'Rework: '+q.what.split('· ')[1], m:'sent back by Joe: "'+note.slice(0,90)+'"', done:false });
  }
  emit('item.returned', `${q.who} · note: "${note.slice(0,60)}" · back in their feed`);
  toast('Returned with your note. It goes back into their ranked feed, never into a void.');
  render();
}
function checkCert(){
  const allDone = S.cert.items.every(i => i.done);
  if (allDone && S.cert.quiz.passed && !S.gateReady) {
    S.gateReady = true;
    emit('certification.concluded', 'Listing Basics · quiz + leader approval satisfied');
    emit('gate.check', 'Fundamentals: Buyer Basics ✓ + Listing Basics ✓ → READY');
  }
}

function addItem(ty){

function removeItem(idx){

function moveItem(idx,dir){
  const j = idx + dir;
  if (j < 0 || j >= S.cert.items.length) return;
  draftify();
  [S.cert.items[idx], S.cert.items[j]] = [S.cert.items[j], S.cert.items[idx]];
  render();
}

  const meta = 'assigned by Joe · ' + (due === 0 ? 'due today' : 'due Friday');
  const sarahTask = () => S.tasks.push({ id:'l'+Date.now(), src:'leader', nm, m:meta, due, done:false });
  const agentTask = name => S.agents[name].tasks.push({ nm, m:meta, done:false });
  if (who === 'group') {
    // real fan-out: one task instance per agent, all in state
    sarahTask();
    agentTask('Mike Torres'); agentTask('Dana Wells');
    ['Sarah Johnson','Mike Torres','Dana Wells'].forEach(a =>
      emit('task.assigned', '"'+nm+'" · to '+a+' · one instance each'));
    toast('Fanned out: 3 real instances. It is in Sarah’s feed now; tap "inspect" under the counts to see the same task in Mike’s and Dana’s lists.');
  } else if (who === 'sarah') {
    sarahTask();
    emit('task.assigned', '"'+nm+'" · to Sarah Johnson · by Joe');
    toast(due === 0 ? 'Assigned. It is already in Sarah’s ranked feed.' : 'Assigned for later this week. Watch it rank as a T3 leader ask in Sarah’s feed.');
  } else {
    agentTask('Mike Torres');
    emit('task.assigned', '"'+nm+'" · to Mike Torres · by Joe');
    toast('Assigned to Mike. His count moved because his task list did; tap "inspect" to see it there.');
  }
  emit('home.feed.reordered', 'recipients re-ranked');
  inp.value = '';
  render();
}
function addPath(){
  S.newPaths.push('New Certification ' + (S.newPaths.length + 2));
  emit('builder.path_added', 'Fundamentals · elective · draft');
  toast('Certification added to the stage. Compose its items, then publish.');
  render();
}

emit('demo.loaded', 'mock data · every view renders from one state object');
render();
</script>
